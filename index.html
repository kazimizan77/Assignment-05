<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | GitHub Issues Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">
    <div
      class="card w-full max-w-[420px] bg-white rounded-2xl border border-slate-200 shadow-xl p-8"
    >
      <div class="text-center space-y-3">
        <img src="assets/github-logo.png" class="w-16 mx-auto" />

        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>

        <p class="text-[#64748bFF]">Sign in to manage your issues</p>
      </div>

      <div class="mt-6 space-y-4">
        <div>
          <label class="text-sm font-medium"> Username </label>

          <input
            id="username"
            type="text"
            placeholder="Enter Username"
            class="input input-bordered w-full mt-1"
          />
        </div>

        <div>
          <label class="text-sm font-medium"> Password </label>

          <input
            id="password"
            type="password"
            placeholder="Enter Password"
            class="input input-bordered w-full mt-1"
          />
        </div>

        <button id="btn-login" class="btn btn-primary rounded-xl w-full mt-3">
          Sign In
        </button>
      </div>
    </div>

    <script src="script/login.js"></script>
  </body>
</html>
